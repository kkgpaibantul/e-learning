<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning PAI SD - KKG Bantul</title>
    <!-- Font modern -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === VARIABEL WARNA & RESET === */
        :root {
            --sidebar-bg: #111827; 
            --sidebar-hover: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #10b981; /* Aksen hijau */
            --bg-body: #f3f4f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-body);
            overflow: hidden;
        }

        /* === SIDEBAR STYLING === */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid #374151;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        /* Desain Tombol Accordion */
        .accordion-btn {
            background-color: transparent;
            color: var(--text-main);
            cursor: pointer;
            padding: 14px 24px;
            width: 100%;
            text-align: left;
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion-btn:hover, .accordion-btn.active {
            background-color: var(--sidebar-hover);
            border-left: 4px solid var(--accent-color);
            padding-left: 20px;
        }

        .accordion-btn::after {
            content: '\276F'; 
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }
        
        .accordion-btn.active::after {
            transform: rotate(90deg);
        }

        /* Panel Sub-menu */
        .panel {
            background-color: #0b0f19;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .panel ul {
            list-style: none;
            padding: 8px 0;
        }

        .panel li {
            padding: 10px 24px 10px 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .panel li:hover {
            color: #ffffff;
            background-color: rgba(255,255,255,0.05);
        }

        .panel li.active-slide {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* === MAIN CONTENT (VIEWER AREA) === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .viewer-container {
            flex: 1;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative; /* Penting untuk tombol absolut */
        }

        /* Penyesuaian saat masuk mode fullscreen */
        .viewer-container:fullscreen {
            border-radius: 0;
            padding: 0;
            background-color: #000000;
        }

        .viewer-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #f9fafb;
        }
        
        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #9ca3af;
            text-align: center;
            pointer-events: none;
        }

        #status-pesan {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* === TOMBOL FULLSCREEN MELAYANG === */
        .btn-fullscreen {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
            display: none; /* Disembunyikan awalnya */
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: all 0.3s ease;
        }

        .btn-fullscreen:hover {
            transform: scale(1.1);
            background-color: #059669;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>KKG PAI Kab. Bantul</h2>
            <p>E-Learning PAI CP 020 Tahun 2026</p>
        </div>
        
        <div class="sidebar-menu" id="tempat-menu-sidebar">
            <div id="status-pesan">Memuat daftar materi...</div>
        </div>
    </aside>

    <!-- VIEWER MATERI -->
    <main class="main-content">
        <!-- Tambahkan ID ke container agar bisa di-fullscreen-kan -->
        <div class="viewer-container" id="viewer-container">
            
            <div class="placeholder-text" id="placeholder">
                <h3>Pilih materi di menu samping</h3>
                <p>Slide akan muncul di sini</p>
            </div>
            
            <!-- Tambahkan allowfullscreen pada iframe -->
            <iframe id="slide-viewer" src="" allowfullscreen></iframe>

            <!-- Tombol Fullscreen melayang (Ikon dari Lucide/Feather) -->
            <button id="btn-fullscreen" class="btn-fullscreen" title="Layar Penuh" onclick="toggleFullscreen()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
        </div>
    </main>

    <!-- SCRIPT LOGIKA -->
    <script>
        async function bangunSidebar() {
            const menuContainer = document.getElementById('tempat-menu-sidebar');
            
            try {
                const response = await fetch('data-materi.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                menuContainer.innerHTML = ''; 

                data.forEach(itemKelas => {
                    const btn = document.createElement('button');
                    btn.className = 'accordion-btn';
                    btn.textContent = itemKelas.kelas;
                    
                    const panel = document.createElement('div');
                    panel.className = 'panel';
                    const ul = document.createElement('ul');

                    itemKelas.bab.forEach(itemBab => {
                        const li = document.createElement('li');
                        li.textContent = itemBab.judul;
                        
                        li.onclick = function() {
                            loadSlide(itemBab.file);
                            tandaiAktif(this);
                        }; 
                        
                        ul.appendChild(li);
                    });

                    panel.appendChild(ul);
                    menuContainer.appendChild(btn);
                    menuContainer.appendChild(panel);
                });

                aktifkanAccordion();

            } catch (error) {
                console.error("Gagal memuat data materi:", error);
                menuContainer.innerHTML = `<div id="status-pesan">Gagal memuat daftar materi.<br>Pastikan file data-materi.json tersedia.</div>`;
            }
        }

        function aktifkanAccordion() {
            const accordions = document.querySelectorAll(".accordion-btn");
            accordions.forEach(acc => {
                acc.addEventListener("click", function() {
                    accordions.forEach(other => {
                        if (other !== this && other.classList.contains("active")) {
                            other.classList.remove("active");
                            other.nextElementSibling.style.maxHeight = null;
                        }
                    });

                    this.classList.toggle("active");
                    const panel = this.nextElementSibling;
                    if (panel.style.maxHeight) {
                        panel.style.maxHeight = null;
                    } else {
                        panel.style.maxHeight = panel.scrollHeight + "px";
                    }
                });
            });
        }

        function loadSlide(url) {
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('slide-viewer').src = url;
            
            // Munculkan tombol fullscreen setelah slide dipilih
            document.getElementById('btn-fullscreen').style.display = 'flex';
        }

        function tandaiAktif(elemenList) {
            const semuaLi = document.querySelectorAll('.panel li');
            semuaLi.forEach(li => li.classList.remove('active-slide'));
            elemenList.classList.add('active-slide');
        }

        // === FUNGSI FULLSCREEN ===
        const viewerContainer = document.getElementById('viewer-container');

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                // Masuk Fullscreen
                if (viewerContainer.requestFullscreen) {
                    viewerContainer.requestFullscreen();
                } else if (viewerContainer.webkitRequestFullscreen) { /* Safari */
                    viewerContainer.webkitRequestFullscreen();
                } else if (viewerContainer.msRequestFullscreen) { /* IE11 */
                    viewerContainer.msRequestFullscreen();
                }
            } else {
                // Keluar Fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        }

        bangunSidebar();
    </script>
</body>
</html>
