<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning PAI SD</title>
    <!-- Font modern -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* === VARIABEL WARNA & RESET === */
        :root {
            --sidebar-bg: #111827; 
            --sidebar-hover: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #10b981; /* Aksen hijau untuk tema Islami */
            --bg-body: #f3f4f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-body);
            overflow: hidden;
        }

        /* === SIDEBAR STYLING === */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid #374151;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Container untuk menu yang di-generate JSON */
        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        /* Desain Tombol Accordion */
        .accordion-btn {
            background-color: transparent;
            color: var(--text-main);
            cursor: pointer;
            padding: 14px 24px;
            width: 100%;
            text-align: left;
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion-btn:hover, .accordion-btn.active {
            background-color: var(--sidebar-hover);
            border-left: 4px solid var(--accent-color);
            padding-left: 20px;
        }

        .accordion-btn::after {
            content: '\276F'; /* Ikon panah */
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }
        
        .accordion-btn.active::after {
            transform: rotate(90deg);
        }

        /* Panel Sub-menu (Isi Bab) */
        .panel {
            background-color: #0b0f19;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .panel ul {
            list-style: none;
            padding: 8px 0;
        }

        .panel li {
            padding: 10px 24px 10px 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .panel li:hover {
            color: #ffffff;
            background-color: rgba(255,255,255,0.05);
        }

        /* Menandai materi yang sedang aktif di sidebar */
        .panel li.active-slide {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* === MAIN CONTENT (VIEWER AREA) === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .viewer-container {
            flex: 1;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;
        }

        .viewer-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #f9fafb;
        }
        
        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #9ca3af;
            text-align: center;
            pointer-events: none;
        }

        /* Pesan loading atau error untuk JSON */
        #status-pesan {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>KKG PAI Kabupaten Bantul</h2>
            <p>E-Learning PAI CP 020 Tahun 2026</p>
        </div>
        
        <!-- Di sinilah JavaScript akan menyuntikkan tombol-tombol kelas dan bab -->
        <div class="sidebar-menu" id="tempat-menu-sidebar">
            <div id="status-pesan">Memuat daftar materi...</div>
        </div>
    </aside>

    <!-- VIEWER MATERI -->
    <main class="main-content">
        <div class="viewer-container">
            <div class="placeholder-text" id="placeholder">
                <h3>Pilih materi di menu samping</h3>
                <p>Slide akan muncul di sini</p>
            </div>
            <!-- Iframe untuk menampilkan slide -->
            <iframe id="slide-viewer" src=""></iframe>
        </div>
    </main>

    <!-- SCRIPT LOGIKA -->
    <script>
        // 1. Fungsi Utama: Mengambil dan Merakit Sidebar dari JSON
        async function bangunSidebar() {
            const menuContainer = document.getElementById('tempat-menu-sidebar');
            
            try {
                // Fetch mengambil file JSON
                const response = await fetch('data-materi.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Kosongkan pesan loading
                menuContainer.innerHTML = ''; 

                // Looping data kelas
                data.forEach(itemKelas => {
                    // Buat tombol Accordion untuk Kelas
                    const btn = document.createElement('button');
                    btn.className = 'accordion-btn';
                    btn.textContent = itemKelas.kelas;
                    
                    // Buat panel untuk menampung Bab
                    const panel = document.createElement('div');
                    panel.className = 'panel';
                    const ul = document.createElement('ul');

                    // Looping data Bab di dalam kelas tersebut
                    itemKelas.bab.forEach(itemBab => {
                        const li = document.createElement('li');
                        li.textContent = itemBab.judul;
                        
                        // Event saat Bab diklik
                        li.onclick = function() {
                            loadSlide(itemBab.file);
                            tandaiAktif(this); // Beri warna pada menu yang diklik
                        }; 
                        
                        ul.appendChild(li);
                    });

                    panel.appendChild(ul);
                    
                    // Suntikkan ke HTML
                    menuContainer.appendChild(btn);
                    menuContainer.appendChild(panel);
                });

                // Pasang logika klik untuk menu accordion yang baru dibuat
                aktifkanAccordion();

            } catch (error) {
                console.error("Gagal memuat data materi:", error);
                menuContainer.innerHTML = `<div id="status-pesan">Gagal memuat daftar materi.<br>Pastikan file data-materi.json tersedia.</div>`;
            }
        }

        // 2. Fungsi Logika Accordion (Buka/Tutup Menu)
        function aktifkanAccordion() {
            const accordions = document.querySelectorAll(".accordion-btn");

            accordions.forEach(acc => {
                acc.addEventListener("click", function() {
                    // Tutup menu lain yang sedang terbuka
                    accordions.forEach(other => {
                        if (other !== this && other.classList.contains("active")) {
                            other.classList.remove("active");
                            other.nextElementSibling.style.maxHeight = null;
                        }
                    });

                    // Toggle menu yang diklik
                    this.classList.toggle("active");
                    const panel = this.nextElementSibling;
                    if (panel.style.maxHeight) {
                        panel.style.maxHeight = null;
                    } else {
                        panel.style.maxHeight = panel.scrollHeight + "px";
                    }
                });
            });
        }

        // 3. Fungsi Load Slide ke dalam Iframe
        function loadSlide(url) {
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('slide-viewer').src = url;
        }

        // 4. Fungsi Visual: Menandai Bab yang sedang dibaca
        function tandaiAktif(elemenList) {
            // Hapus class active dari semua li
            const semuaLi = document.querySelectorAll('.panel li');
            semuaLi.forEach(li => li.classList.remove('active-slide'));
            
            // Tambahkan class active ke li yang diklik
            elemenList.classList.add('active-slide');
        }

        // JALANKAN SCRIPT SAAT HALAMAN DIBUKA
        bangunSidebar();
    </script>
</body>
</html>
